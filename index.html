<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vklass Jeopardy - Tyresö Kommun</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-gradient: linear-gradient(135deg, #005a92, #0082c8); /* Tyresö-inspirerad blå */
            --secondary-gradient: linear-gradient(135deg, #0072bc, #3399ff);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: #d1d8e0;
            --text-color: #2f3640;
            --accent-color: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-transform: uppercase;
        }

        .scoreboard {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        .team {
            background: white;
            border: 1px solid var(--card-border);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #576574;
            outline: none;
        }

        .team-score {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-gradient);
        }

        .jeopardy-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 1100px;
        }

        .category {
            background: var(--primary-gradient);
            color: white;
            padding: 15px 10px;
            text-align: center;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell {
            background: white;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #2980b9;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cell:hover {
            background: #ecf0f1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cell.played {
            background: #dfe6e9;
            color: transparent;
            cursor: default;
            pointer-events: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 700px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .modal-clue { font-size: 1.8rem; margin-bottom: 30px; color: #2c3e50; }
        .modal-answer { font-size: 1.5rem; color: #27ae60; font-weight: 700; display: none; margin-bottom: 20px; }
        .modal-answer.show { display: block; }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            font-weight: 700;
            margin: 5px;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }

        .lobby-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lobby-screen.hidden { display: none; }
        
        .category-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; justify-content: center; }
        .lobby-card { border: 2px solid #3498db; padding: 15px; border-radius: 10px; width: 180px; text-align: center; }

        #game-container { display: none; width: 100%; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div class="lobby-screen" id="lobby-screen">
        <h1>Vklass Jeopardy</h1>
        <p>Tyresö kommuns riktlinjer för personal och elever</p>
        <div class="category-list" id="category-list">Laddar kategorier...</div>
        <button class="btn btn-primary" style="font-size: 1.2rem;" id="btn-start-game">Starta Utbildningen</button>
    </div>

    <div id="game-container">
        <h1>Vklass Jeopardy</h1>
        <div class="scoreboard">
            <div class="team" id="team1">
                <div class="team-name" contenteditable="true">Lag A</div>
                <div class="team-score">0</div>
            </div>
            <div class="team" id="team2">
                <div class="team-name" contenteditable="true">Lag B</div>
                <div class="team-score">0</div>
            </div>
            <div class="team" id="team3">
                <div class="team-name" contenteditable="true">Lag C</div>
                <div class="team-score">0</div>
            </div>
        </div>
        <div class="jeopardy-board" id="board"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div id="modal-points" style="color:#3498db; font-weight:700;"></div>
            <div class="modal-clue" id="modal-clue"></div>
            <div class="modal-answer" id="modal-answer"></div>
            
            <button class="btn btn-primary" id="btn-show-answer">Visa Svar</button>
            
            <div id="award-section" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                <p>Vem svarade rätt?</p>
                <button class="btn btn-success" onclick="awardPoints(1)">Lag A</button>
                <button class="btn btn-success" onclick="awardPoints(2)">Lag B</button>
                <button class="btn btn-success" onclick="awardPoints(3)">Lag C</button>
                <button class="btn" style="background:#bdc3c7;" onclick="closeModal()">Ingen</button>
            </div>
        </div>
    </div>

    <script>
        let allCategories = [];
        let activeCategories = [];
        let scores = [0, 0, 0, 0];
        let currentPoints = 0;
        let activeCell = null;

        const synth = window.speechSynthesis;
        const boardEl = document.getElementById('board');
        const modalOverlay = document.getElementById('modal-overlay');
        const btnStartGame = document.getElementById('btn-start-game');

        async function loadData() {
            try {
                const response = await fetch('data.json');
                allCategories = await response.json();
                activeCategories = allCategories.slice(0, 5); // Tar de 5 första
                renderLobby();
            } catch (e) {
                document.getElementById('category-list').innerHTML = "Kunde inte ladda data.json.";
            }
        }

        function renderLobby() {
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            activeCategories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'lobby-card';
                div.textContent = cat.category;
                list.appendChild(div);
            });
        }

        btnStartGame.onclick = () => {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-container').style.display = 'flex';
            initBoard();
            speak("Välkomna till Vklass Jeopardy. Här testar vi era kunskaper om Tyresös riktlinjer.");
        };

        function initBoard() {
            boardEl.innerHTML = '';
            // Rubriker
            activeCategories.forEach(cat => {
                const el = document.createElement('div');
                el.className = 'category';
                el.textContent = cat.category;
                boardEl.appendChild(el);
            });
            // Celler
            for (let i = 0; i < 5; i++) {
                activeCategories.forEach(cat => {
                    const q = cat.questions[i];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = q.points;
                    cell.onclick = () => openQuestion(q, cell);
                    boardEl.appendChild(cell);
                });
            }
        }

        function openQuestion(q, cell) {
            currentPoints = q.points;
            activeCell = cell;
            document.getElementById('modal-points').textContent = q.points + " Poäng";
            document.getElementById('modal-clue').textContent = q.clue;
            document.getElementById('modal-answer').textContent = q.answer;
            document.getElementById('modal-answer').classList.remove('show');
            document.getElementById('award-section').style.display = 'none';
            document.getElementById('btn-show-answer').style.display = 'inline-block';
            modalOverlay.classList.add('active');
            speak(q.clue);
        }

        document.getElementById('btn-show-answer').onclick = () => {
            document.getElementById('modal-answer').classList.add('show');
            document.getElementById('award-section').style.display = 'block';
            document.getElementById('btn-show-answer').style.display = 'none';
        };

        function awardPoints(team) {
            scores[team] += currentPoints;
            updateScores();
            closeModal();
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            if(activeCell) {
                activeCell.classList.add('played');
                activeCell = null;
            }
            checkEnd();
        }

        function updateScores() {
            for(let i=1; i<=3; i++) {
                document.querySelector(`#team${i} .team-score`).textContent = scores[i];
            }
        }

        function checkEnd() {
            const played = document.querySelectorAll('.cell.played').length;
            const total = activeCategories.length * 5;
            if(played === total) {
                speak("Spelet är slut. Bra jobbat med Vklass-utbildningen!");
            }
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'sv-SE';
            synth.speak(u);
        }

        loadData();
    </script>
</body>
</html>
